<!DOCTYPE html>
<html lang="en"><head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>You are heading for an external website</title>
    <link rel="icon" href="/favicon.png">
  <body>
    <style>
        :root {
          --ink: #0b0f14;
          --shadow: rgba(0, 0, 0, 0.18);
        }
    
        * { box-sizing: border-box; }
    
        main {
          margin: 0;
          font-family: "Space Grotesk", "Trebuchet MS", sans-serif;
          color: var(--ink);
          min-height: 100vh;
          overflow-x: hidden;
          display: flex;
          justify-content: center;
          align-items: center;
        }

        .card {
          position: relative;
          width: min(920px, 92vw);
          background: linear-gradient(80deg, #2600ff, #47fcff);
          border-radius: 28px;
          padding: 56px 56px 64px;
          box-shadow: 0 40px 120px var(--shadow);
          overflow: hidden;
          z-index: 1;
        }
    
        h1 {
          margin: 0 0 24px;
          font-size: clamp(2.6rem, 4vw, 3.6rem);
          line-height: 1.05;
        }
    
        .cta {
          display: inline-flex;
          align-items: center;
          gap: 12px;
          padding: 14px 22px;
          border-radius: 14px;
          background: #10151c;
          color: white;
          text-decoration: none;
          font-weight: 600;
          letter-spacing: 0.01em;
          box-shadow: 0 16px 40px rgba(16, 21, 28, 0.28);
          transition: transform 200ms ease, box-shadow 200ms ease;
        }
    
        .cta:hover {
          transform: translateY(-2px);
          box-shadow: 0 20px 50px rgba(16, 21, 28, 0.35);
        }
    
        @media (max-width: 640px) {
          .card { padding: 36px 28px 40px; }
          h1 { font-size: 2.2rem; }
        }
    </style>
    <main>
        <div class="card">
            <h1>Heads Up!</h1>
            <h2>You are leaving our website</h2>
            <p>We are not responsible for "https://ihg.ddns.net" practices. <br>Your use is at your own risk.</p>
            <a class="cta" href="https://ihg.ddns.net" target="_blank">
              Head to extra games
              <span aria-hidden="true">→</span>
            </a>
        </div>
    </main>
  </body>
</html>
