<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Example dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            padding: 2rem;
        }
        .left-content {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .stat-card {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 16px;
            padding: 1.5rem;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #0d6efd;
        }
        .stat-label {
            color: #888;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            margin: 0;
        }
        .recent-activity {
            flex-grow: 1;
            background-color: #181818;
            margin-left: 2rem;
            border-radius: 24px;
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .recent-header {
            padding: 1.5rem 2rem;
            background: #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }
        #activity-list {
            padding: 1.5rem 2rem;
            list-style: none;
            overflow-y: auto;
        }
        .activity-item {
            padding: 1rem;
            border-bottom: 1px solid #222;
            animation: fadeIn 0.5s ease-out;
        }
        .activity-user {
            color: #0d6efd;
            font-weight: 600;
            margin-right: 8px;
        }
        .activity-text { color: #bbb; }
        .highlight { color: #ffca28; font-style: italic; }


       
        .custom-dropdown {
            position: absolute;
            top: 100%;
            right: 2rem;
            background: #252525;
            border: 1px solid #444;
            border-radius: 8px;
            z-index: 1000;
            width: 220px;
            padding: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: none;
        }
        .custom-dropdown.show { display: block; }
        .dropdown-section { margin-bottom: 10px; font-size: 0.8rem; color: #888; }
       
        /* Tooltip / Mod Menu */
        .user-tooltip {
            position: fixed;
            background: #2c2c2c;
            border: 1px solid #0d6efd;
            border-radius: 12px;
            padding: 15px;
            z-index: 2000;
            width: 200px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        .mod-btn { width: 100%; margin-top: 5px; text-align: left; font-size: 0.85rem; }
        .ban-reason { background: #121212; border: 1px solid #444; color: white; width: 100%; font-size: 0.8rem; margin-top: 5px; }
   
        .activity-user { cursor: pointer; text-decoration: underline dotted; }
        .activity-user:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="left-content">
        <div class="stat-card">
            <p class="stat-label">Users Online</p>
            <h2 class="stat-value" id="online-count">17</h2>
        </div>
        <div class="stat-card">
            <p class="stat-label">Total Users</p>
            <h2 class="stat-value">60</h2>
        </div>
        <div class="stat-card">
            <p class="stat-label">Messages / Min</p>
            <h2 class="stat-value" id="mpm-count">134</h2>
        </div>
        <div class="stat-card">
            <p class="stat-label">Games Active</p>
            <h2 class="stat-value">5</h2>
        </div>
    </div>


    <div class="recent-activity">
        <div class="recent-header">
            <h3 class="m-0">Recent Activity</h3>
            <!-- FIX: Added 'event' as an argument here -->
            <button class="btn btn-outline-light btn-sm" onclick="toggleFilter(event)">Filter</button>
           
            <div id="filter-menu" class="custom-dropdown" onclick="event.stopPropagation()">
                <div class="dropdown-section">Category</div>
                <select id="type-filter" class="form-select form-select-sm mb-3" onchange="applyFilters()">
                    <option value="all">All Activities</option>
                    <option value="chat">Chats</option>
                    <option value="poll">Polls</option>
                    <option value="moment">Moments</option>
                    <option value="discussion">Discussions</option>
                </select>
               
                <div class="dropdown-section">Search Username</div>
                <input type="text" id="user-search" class="form-control form-control-sm" placeholder="e.g. @alex" onkeyup="applyFilters()">
            </div>
        </div>
        <div id="activity-list"></div>
    </div>
   
    <script>
        // Pools for generating random, unique activity
        const users = ["@alex", "@Jim", "@Jace-wins", "@GOATmez", "@Sarah", "@Misty_02", "@Dev_King", "@PixelQueen"];
        const subjects = {
            chat: ["about the update", "the new event", "Hi everyone!", "Is anyone online?", "LOL!"],
            poll: ["'Best Pizza?'", "'Next Game?'", "'Favorite Color?'", "'Weekend plans?'"],
            moment: ["a sunset photo", "their setup", "a high score", "new artwork"],
            discussion: ["the server rules", "leveling up", "the dev log", "balance changes"],
            game: ["Chess", "Snake", "Tetris", "Poker", "Battle Arena"]
        };


        const actions = [
            { text: "just chatted", type: "chat", getSub: () => subjects.chat[Math.floor(Math.random() * subjects.chat.length)] },
            { text: "voted on", type: "poll", getSub: () => subjects.poll[Math.floor(Math.random() * subjects.poll.length)] },
            { text: "posted", type: "moment", getSub: () => subjects.moment[Math.floor(Math.random() * subjects.moment.length)] },
            { text: "replied to", type: "discussion", getSub: () => subjects.discussion[Math.floor(Math.random() * subjects.discussion.length)] },
            { text: "is playing", type: "game", getSub: () => subjects.game[Math.floor(Math.random() * subjects.game.length)] }
        ];


        let history = [];


        function toggleFilter(e) {
            if (e) e.stopPropagation();
            document.getElementById('filter-menu').classList.toggle('show');
        }


        function addActivity() {
            const user = users[Math.floor(Math.random() * users.length)];
            const action = actions[Math.floor(Math.random() * actions.length)];
            const highlight = action.getSub();


            // Create unique data object
            const newAct = {
                user: user,
                text: action.text,
                highlight: highlight,
                type: action.type,
                id: Date.now()
            };


            history.unshift(newAct);
            if (history.length > 50) history.pop();
            applyFilters();
        }


        function applyFilters() {
            const type = document.getElementById('type-filter').value;
            const userSearch = document.getElementById('user-search').value.toLowerCase();
           
            const filtered = history.filter(a => {
                const matchesType = type === 'all' || a.type === type;
                const matchesUser = a.user.toLowerCase().includes(userSearch);
                return matchesType && matchesUser;
            });
            render(filtered);
        }


        function render(data) {
            const list = document.getElementById('activity-list');
            list.innerHTML = '';
            // Show top 8 items from history
            data.slice(0, 8).forEach(act => {
                const div = document.createElement('div');
                div.className = 'activity-item';
                div.innerHTML = `
                    <span class="activity-user" onclick="openModMenu(event, '${act.user}')">${act.user}</span>
                    <span class="activity-text">${act.text}</span>
                    <span class="highlight">"${act.highlight}"</span>
                `;
                list.appendChild(div);
            });
        }


        function openModMenu(e, username) {
            if (e) e.stopPropagation();
            const existing = document.querySelector('.user-tooltip');
            if(existing) existing.remove();


            const menu = document.createElement('div');
            menu.className = 'user-tooltip';
            menu.style.left = (e.clientX + 10) + 'px';
            menu.style.top = (e.clientY + 10) + 'px';
           
            menu.innerHTML = `
                <div style="font-weight:bold; color:#0d6efd; margin-bottom:8px;">Manage ${username}</div>
                <input type="text" class="ban-input" id="reason" placeholder="Ban reason...">
                <button class="btn btn-danger btn-sm mod-btn" onclick="alert('Banned for: ' + document.getElementById('reason').value)">Ban User</button>
               
                <div class="dropdown mt-2">
                    <button class="btn btn-secondary btn-sm mod-btn dropdown-toggle" type="button" onclick="this.nextElementSibling.classList.toggle('show')">
                        Block From...
                    </button>
                    <div class="dropdown-menu p-2 bg-dark border-secondary" style="color:white; min-width:150px;">
                        <div class="form-check"><input type="checkbox" class="form-check-input"><label class="form-check-label">Chats</label></div>
                        <div class="form-check"><input type="checkbox" class="form-check-input"><label class="form-check-label">Polls</label></div>
                        <div class="form-check"><input type="checkbox" class="form-check-input"><label class="form-check-label">Moments</label></div>
                        <div class="form-check"><input type="checkbox" class="form-check-input"><label class="form-check-label">Games</label></div>
                    </div>
                </div>
                <button class="btn btn-primary btn-sm mod-btn mt-2" onclick="this.closest('.user-tooltip').remove()">Done</button>
            `;
            document.body.appendChild(menu);
        }


        window.onclick = function(event) {
            document.getElementById('filter-menu').classList.remove('show');
            const tool = document.querySelector('.user-tooltip');
            if(tool && !tool.contains(event.target)) tool.remove();
        };


        // Start the loop
        for(let i=0; i<5; i++) addActivity();
        setInterval(addActivity, 1000);


    </script>
</body>
</html>
